name: Zero Trust Architecture
description: A security framework that requires all users and devices to be authenticated,
  authorized, and continuously validated before being granted access to applications
  and data, regardless of whether they are inside or outside the network perimeter.
  It is widely adopted across industries to safeguard digital assets and reduce security
  risks.
